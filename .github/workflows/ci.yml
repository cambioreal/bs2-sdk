name: ci

# Quality gate: build limpo (TreatWarningsAsErrors) + testes. Falha o PR se algo escorregar.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - run: dotnet restore Bs2.slnx

      - run: dotnet build Bs2.slnx -c Release --no-restore

      - run: dotnet test Bs2.slnx -c Release --no-build --logger "trx;LogFileName=results.trx"

      # Empacotar no CI garante que um erro de pack (README ausente, metadata inválida)
      # apareça no PR, e não só na hora de publicar uma tag.
      - run: dotnet pack src/CambioReal.Bs2.Client/CambioReal.Bs2.Client.csproj -c Release --no-build -o artifacts

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/*.trx'
