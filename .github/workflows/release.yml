name: release

# Publica no GitHub Packages da org cambioreal a partir de uma tag `v*`.
# A versão do pacote vem da tag, não do Directory.Build.props — a tag é a fonte da verdade.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Derivar versão da tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - run: dotnet restore Bs2.slnx

      # Nunca publicar um pacote cujos testes não passaram.
      - run: dotnet test Bs2.slnx -c Release

      - run: >
          dotnet pack src/CambioReal.Bs2.Client/CambioReal.Bs2.Client.csproj
          -c Release -o artifacts
          -p:Version=${{ steps.version.outputs.value }}

      # GITHUB_TOKEN basta para publicar na própria org; não é preciso PAT.
      - name: Push para o GitHub Packages
        run: >
          dotnet nuget push artifacts/*.nupkg
          --source https://nuget.pkg.github.com/cambioreal/index.json
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate
